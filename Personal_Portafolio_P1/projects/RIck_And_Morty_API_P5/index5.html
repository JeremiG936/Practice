<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Rickpedia</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="styles5.css">
        <link rel="icon" type="image/png" href="resources/rick.png">
    </head>
    <body>
        <div class="container-fluid">
            <nav class="nav-bar d-flex">
                <img src="resources/rickandmortybanner.png" alt="r&mbanner" id="banner" class="m-3">
                <div class="ms-auto mt-auto mb-auto">
                    <input type="text" id="search-bar" placeholder="Look for a character...">
                    <button type="button" id="search-btn">
                        <img src="resources/loupe.png" id="search-img">
                    </button>
                </div>
                <div class="dropdown ms-5 me-5 mt-auto mb-auto">
                    <button class="btn btn-secondary" type="button" onclick="renderFavoriteCards()">
                        <img src="/RIck_And_Morty_API_P5/resources/star.png" id="star">
                        Favorites
                    </button>
                </div>
            </nav>
            <p id="result-info" class="mt-3 mb-3"></p>
            <div class="row justify-content-center" id="cards-holder"></div>
            <div id="page-btns" class="d-flex justify-content-center"></div>
        </div>
        <script src="script5.js"></script>
    </body>
</html>
