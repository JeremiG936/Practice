<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Basic Calculator</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="styles3.css">
        <link rel="icon" type="image/png" href="resources/clipboard.png">
    </head>
    <body>
        <div class="container-fluid d-flex justify-content-center min-vh-100 align-items-center">
            <div class="calculator">
                <div id="displayer" class="display">0</div>
                <div class="buttons">
                    <button type="button" id="btn-clear">AC</button>
                    <button type="button" id="btn-del">Del</button>
                    <button>N</button>
                    <button type="button" id="btn-div" class="operator">÷</button>
                    <button type="button" id="btn-7">7</button>
                    <button type="button" id="btn-8">8</button>
                    <button type="button" id="btn-9">9</button>
                    <button type="button" id="btn-mult" class="operator">x</button>
                    <button type="button" id="btn-4">4</button>
                    <button type="button" id="btn-5">5</button>
                    <button type="button" id="btn-6">6</button>
                    <button type="button" id="btn-min" class="operator">-</button>
                    <button type="button" id="btn-1">1</button>
                    <button type="button" id="btn-2">2</button>
                    <button type="button" id="btn-3">3</button>
                    <button type="button" id="btn-sum" class="operator">+</button>
                    <button type="button" id="btn-0">0</button>
                    <button type="button" id="btn-dec">.</button>
                    <button type="button" id="btn-equal" class="equal">=</button>
                </div>
            </div>
        </div>
        <script src="script3.js"></script>
    </body>
</html>
