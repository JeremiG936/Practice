<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Basic Calculator</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="styles3.css">
        <link rel="icon" type="image/png" href="resources/clipboard.png">
    </head>
    <body>
        <div class="container-fluid d-flex justify-content-center min-vh-100 align-items-center">
            <div class="calculator">
                <div id="displayer" class="display">0</div>
                <div class="buttons">
                    <button>AC</button>
                    <button>(</button>
                    <button>)</button>
                    <button class="operator">÷</button>
                    <button>7</button>
                    <button>8</button>
                    <button>9</button>
                    <button class="operator">×</button>
                    <button>4</button>
                    <button>5</button>
                    <button>6</button>
                    <button class="operator">−</button>
                    <button id="btn-1">1</button>
                    <button>2</button>
                    <button>3</button>
                    <button class="operator">+</button>
                    <button>0</button>
                    <button>.</button>
                    <button class="equal">=</button>
                </div>
            </div>
        </div>
        <script src="script3.js"></script>
    </body>
</html>
